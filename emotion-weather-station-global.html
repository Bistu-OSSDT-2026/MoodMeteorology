<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>树洞 · 说出来，没关系</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#F7F4EE; --bg-elevated:#FFFFFF;
  --ink:#2B2A28; --ink-soft:#6B6660; --ink-faint:#9C968C;
  --border:rgba(43,42,40,.10); --shadow:rgba(43,42,40,.07);
  --accent-sky:#7B93AE; --accent-sky-soft:#DCE4EC;
  --accent-dawn:#E3A587; --accent-dawn-soft:#F6E4D8;
  --mist:#C9C2B4;

  /* -- 心情色系（10种）-- */
  --m-happy:#E8B84B;    /* 开心 */
  --m-calm:#9FB4C7;     /* 平静 */
  --m-sad:#6E86A6;      /* 难过 */
  --m-upset:#A9615F;    /* 烦躁 */
  --m-anxious:#AFA0C4;  /* 迷茫 */
  --m-grateful:#8FAE8A; /* 感恩 */
  --m-wronged:#C98FA0;  /* 委屈 */
  --m-tired:#A89680;    /* 疲惫 */
  --m-lonely:#5F7290;   /* 孤独 */
  --m-hopeful:#E0A97E;  /* 期待 */

  --font-display:"Noto Serif SC", serif; --font-body:"Noto Sans SC", sans-serif; --font-hand:"Ma Shan Zheng", cursive;
  --radius-s:10px; --radius-m:16px; --radius-l:28px;
  --nav-h:64px; --container:1180px; --gap:24px; --transition:.28s cubic-bezier(.4,0,.2,1);
}
html.dark{
  --bg:#14161D; --bg-elevated:#1C1F27;
  --ink:#EAE6DD; --ink-soft:#A79F92; --ink-faint:#726B60;
  --border:rgba(234,230,221,.08); --shadow:rgba(0,0,0,.35);
  --accent-sky:#8FA8C2; --accent-sky-soft:#26303C;
  --accent-dawn:#E8B79A; --accent-dawn-soft:#3A2C24; --mist:#3C3F49;

  --m-happy:#E3BD6C; --m-calm:#8FA4B8; --m-sad:#7189AA; --m-upset:#B47774; --m-anxious:#B0A2C9;
  --m-grateful:#9DBE96; --m-wronged:#D29FAE; --m-tired:#B8A791; --m-lonely:#7086A6; --m-hopeful:#E6BA95;
}

*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{margin:0; background:var(--bg); color:var(--ink); font-family:var(--font-body); line-height:1.7; -webkit-font-smoothing:antialiased; transition:background var(--transition), color var(--transition);}
h1,h2,h3,.font-display{font-family:var(--font-display);}
.font-hand{font-family:var(--font-hand); font-weight:400;}
a{color:inherit; text-decoration:none;}
button{font-family:inherit; cursor:pointer;}
:focus-visible{outline:2px solid var(--accent-sky); outline-offset:3px; border-radius:4px;}
@media (prefers-reduced-motion:reduce){*{animation-duration:.001s !important; animation-iteration-count:1 !important; transition-duration:.001s !important;}}
.icon-sprite{position:absolute; width:0; height:0; overflow:hidden;}
.icon{width:20px; height:20px; stroke:currentColor; fill:none; stroke-width:1.6; stroke-linecap:round; stroke-linejoin:round; flex-shrink:0;}

.site-header{position:sticky; top:0; z-index:100; height:var(--nav-h); display:flex; align-items:center; background:color-mix(in srgb, var(--bg) 88%, transparent); backdrop-filter:blur(10px); border-bottom:1px solid var(--border);}
.site-header .inner{width:100%; max-width:var(--container); margin:0 auto; padding:0 24px; display:flex; align-items:center; justify-content:space-between; gap:16px;}
.logo{display:flex; align-items:center; gap:10px; font-family:var(--font-display); font-weight:700; font-size:19px; color:var(--ink); letter-spacing:.5px;}
.logo .icon{width:23px; height:23px; color:var(--accent-sky);}
.logo .sub{font-family:var(--font-hand); font-size:14px; color:var(--ink-faint); margin-left:2px; font-weight:400;}
.nav-links{display:flex; align-items:center; gap:6px;}
.nav-links a{padding:9px 16px; border-radius:999px; font-size:14.5px; color:var(--ink-soft); transition:background var(--transition), color var(--transition);}
.nav-links a:hover{background:var(--accent-sky-soft); color:var(--ink);}
.nav-links a.active{background:var(--accent-sky); color:#fff;}
.header-actions{display:flex; align-items:center; gap:10px;}
.theme-toggle{width:38px; height:38px; border-radius:50%; border:1px solid var(--border); background:var(--bg-elevated); display:flex; align-items:center; justify-content:center; transition:transform var(--transition), background var(--transition);}
.theme-toggle:hover{transform:rotate(18deg);}
.theme-toggle .icon{width:18px; height:18px; color:var(--ink-soft);}
.theme-toggle .icon-moon{display:none;} html.dark .theme-toggle .icon-sun{display:none;} html.dark .theme-toggle .icon-moon{display:inline-block;}
.menu-btn{display:none; width:38px; height:38px; border-radius:50%; border:1px solid var(--border); background:var(--bg-elevated); align-items:center; justify-content:center;}
.menu-btn .icon{width:18px; height:18px; color:var(--ink-soft);}

.layout{max-width:var(--container); margin:0 auto; padding:32px 24px 64px; display:grid; grid-template-columns:248px 1fr; gap:var(--gap); align-items:start;}
.sidebar{position:sticky; top:calc(var(--nav-h) + 20px); display:flex; flex-direction:column; gap:20px;}
.side-card{background:var(--bg-elevated); border:1px solid var(--border); border-radius:var(--radius-m); padding:18px; box-shadow:0 6px 20px -12px var(--shadow);}
.side-card h3{margin:0 0 14px; font-size:14px; font-weight:600; color:var(--ink-soft); display:flex; align-items:center; gap:6px; letter-spacing:.3px;}
.side-card h3 .icon{width:15px; height:15px; color:var(--accent-dawn);}
.about-card p{margin:0; font-size:12.5px; color:var(--ink-soft); line-height:1.75;}

.mood-list{display:flex; flex-direction:column; gap:4px;}
.mood-chip{display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:var(--radius-s); font-size:14px; color:var(--ink-soft); border:1px solid transparent; background:transparent; transition:background var(--transition), color var(--transition), border-color var(--transition); width:100%; text-align:left;}
.mood-chip .dot{width:10px; height:10px; border-radius:50%; flex-shrink:0; background:var(--mood-color, var(--mist));}
.mood-chip .count{margin-left:auto; font-size:12px; color:var(--ink-faint);}
.mood-chip:hover{background:var(--bg); color:var(--ink);}
.mood-chip.active{background:var(--bg); border-color:var(--border); color:var(--ink); font-weight:500;}

.content-slot{min-height:400px;}
.mood-grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(220px,1fr)); gap:16px;}
.mood-card{position:relative; display:block; cursor:pointer; background:var(--bg-elevated); border:1px solid var(--border); border-radius:var(--radius-m); padding:18px; box-shadow:0 6px 20px -14px var(--shadow); transition:transform var(--transition), box-shadow var(--transition);}
.mood-card:hover{transform:translateY(-3px); box-shadow:0 12px 28px -16px var(--shadow);}
.mood-card .tag{display:inline-flex; align-items:center; font-size:11.5px; padding:3px 10px; border-radius:999px; margin-bottom:10px; color:#fff; font-weight:500;}
.mood-card p{margin:0; font-size:13.5px; color:var(--ink-soft); line-height:1.65; word-break:break-word;}
.mood-card .foot{margin-top:12px; font-size:11.5px; color:var(--ink-faint); display:flex; justify-content:space-between;}
.mood-card.is-hidden{display:none;}
.mood-card.is-new{animation:riseIn .4s ease;}
@keyframes riseIn{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);}}

/* 仅对"本机发布过"的卡片显示删除入口 */
.mood-card .delete-btn{
  position:absolute; top:10px; right:10px; width:24px; height:24px; border-radius:50%;
  border:1px solid var(--border); background:var(--bg-elevated); color:var(--ink-faint);
  display:flex; align-items:center; justify-content:center; opacity:0;
  transition:opacity var(--transition), background var(--transition), color var(--transition);
}
.mood-card:hover .delete-btn{opacity:1;}
.mood-card .delete-btn:hover{background:var(--m-upset); color:#fff; border-color:var(--m-upset);}
.mood-card .delete-btn .icon{width:12px; height:12px; stroke-width:2;}
.mood-card.own{padding-right:18px;}
.mood-card.own .tag::after{content:"· 我发的"; font-weight:400; opacity:.85; margin-left:2px;}

.confirm-bar{
  position:absolute; inset:0; border-radius:var(--radius-m); background:var(--bg-elevated);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px;
  padding:16px; text-align:center; font-size:12.5px; color:var(--ink-soft); z-index:2;
}
.confirm-bar .row{display:flex; gap:8px;}
.confirm-bar button{padding:6px 16px; border-radius:999px; font-size:12px; border:1px solid var(--border); background:var(--bg);}
.confirm-bar button.danger{background:var(--m-upset); color:#fff; border:none;}

.section-head{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:16px; flex-wrap:wrap;}
.section-title{font-size:15px; font-weight:600; color:var(--ink-soft); margin:0; display:flex; align-items:center; gap:8px;}
.section-title .icon{width:16px; height:16px; color:var(--accent-dawn);}

.bottle-btn{
  display:flex; align-items:center; gap:7px; padding:9px 18px; border-radius:999px;
  border:1.5px solid var(--border); background:var(--bg-elevated); color:var(--ink-soft); font-size:13px;
  transition:all var(--transition);
}
.bottle-btn .icon{width:16px; height:16px; color:var(--accent-dawn);}
.bottle-btn:hover{border-color:var(--accent-dawn); color:var(--ink); transform:translateY(-1px);}

.empty-state{text-align:center; padding:60px 20px; color:var(--ink-faint); border:1.5px dashed var(--border); border-radius:var(--radius-m);}
.empty-state .icon{width:30px; height:30px; margin-bottom:10px; opacity:.6;}

/* ---- 漂流瓶弹窗 ---- */
.bottle-overlay{
  position:fixed; inset:0; background:rgba(20,18,15,.45); backdrop-filter:blur(3px);
  display:flex; align-items:center; justify-content:center; z-index:200; padding:20px;
  opacity:0; pointer-events:none; transition:opacity var(--transition);
}
.bottle-overlay.show{opacity:1; pointer-events:auto;}
.bottle-card{
  background:var(--bg-elevated); border-radius:var(--radius-l); padding:28px;
  max-width:420px; width:100%; transform:translateY(14px) scale(.96); opacity:0;
  transition:transform var(--transition), opacity var(--transition); box-shadow:0 24px 60px -20px rgba(0,0,0,.35);
  position:relative;
}
.bottle-overlay.show .bottle-card{transform:translateY(0) scale(1); opacity:1;}
.bottle-close{position:absolute; top:16px; right:16px; width:28px; height:28px; border-radius:50%; border:1px solid var(--border); background:var(--bg); color:var(--ink-faint); display:flex; align-items:center; justify-content:center;}
.bottle-close .icon{width:13px; height:13px;}
.bottle-head{display:flex; align-items:center; gap:8px; margin-bottom:16px; font-family:var(--font-display); font-size:15px; color:var(--ink-soft);}
.bottle-head .icon{width:18px; height:18px; color:var(--accent-dawn);}
.bottle-hint{font-size:11.5px; color:var(--ink-faint); margin:-10px 0 16px;}
.bottle-content{background:var(--bg); border-radius:var(--radius-m); padding:18px; margin-bottom:18px;}
.bottle-content .tag{display:inline-flex; align-items:center; font-size:11px; padding:3px 10px; border-radius:999px; margin-bottom:10px; color:#fff; font-weight:500;}
.bottle-content p{margin:0; font-size:14.5px; color:var(--ink); line-height:1.75; word-break:break-word;}
.bottle-reply textarea{
  width:100%; min-height:70px; resize:none; padding:12px 14px; border-radius:var(--radius-m);
  border:1.5px solid var(--border); background:var(--bg); color:var(--ink); font-family:var(--font-body);
  font-size:14px; line-height:1.6; transition:border-color var(--transition);
}
.bottle-reply textarea::placeholder{color:var(--ink-faint); font-family:var(--font-hand); font-size:14.5px;}
.bottle-reply textarea:focus{outline:none; border-color:var(--accent-sky);}
.bottle-actions{display:flex; gap:10px; margin-top:14px;}
.bottle-actions button{flex:1; padding:11px; border-radius:999px; font-size:13.5px; transition:all var(--transition);}
.bottle-actions .again-btn{border:1px solid var(--border); background:var(--bg); color:var(--ink-soft);}
.bottle-actions .again-btn:hover{border-color:var(--accent-sky); color:var(--ink);}
.bottle-actions .send-btn{border:none; background:var(--accent-sky); color:#fff; font-weight:500;}
.bottle-actions .send-btn:hover:not(:disabled){background:color-mix(in srgb, var(--accent-sky) 85%, #000);}
.bottle-actions .send-btn:disabled{opacity:.45; cursor:not-allowed;}
.bottle-sent{text-align:center; padding:10px 0; font-size:14px; color:var(--ink-soft); display:none;}
.bottle-sent.show{display:block;}
.bottle-sent .icon{width:26px; height:26px; color:var(--accent-sky); margin-bottom:8px;}

.site-footer{border-top:1px solid var(--border); padding:40px 24px 32px; text-align:center; color:var(--ink-faint);}
.site-footer .quote{font-family:var(--font-hand); font-size:22px; color:var(--ink-soft); margin:0 0 16px; min-height:32px; transition:opacity .35s ease;}
.site-footer .copy{font-size:12px;}

@media (max-width:860px){
  .nav-links{position:fixed; top:var(--nav-h); left:0; right:0; flex-direction:column; align-items:stretch; gap:2px; background:var(--bg-elevated); border-bottom:1px solid var(--border); padding:10px 16px 16px; transform:translateY(-8px); opacity:0; pointer-events:none; transition:opacity var(--transition), transform var(--transition);}
  .nav-links.open{transform:translateY(0); opacity:1; pointer-events:auto;}
  .nav-links a{padding:12px 14px;}
  .menu-btn{display:flex;}
  .layout{grid-template-columns:1fr; padding:20px 16px 48px;}
  .sidebar{position:static; order:1;}
  .mood-list{flex-direction:row; overflow-x:auto; gap:8px; padding-bottom:4px;}
  .mood-list::-webkit-scrollbar{display:none;}
  .mood-chip{flex-shrink:0; width:auto; white-space:nowrap;}
  .mood-chip .count{display:none;}
  .content-slot{order:0;}
}
</style>
</head>
<body>

<script>
const root = document.documentElement;
const themeToggle = document.getElementById('themeToggle');
const savedTheme = localStorage.getItem('ews-theme');
if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) root.classList.add('dark');
themeToggle.addEventListener('click', () => {
  root.classList.toggle('dark');
  localStorage.setItem('ews-theme', root.classList.contains('dark') ? 'dark' : 'light');
});
const menuBtn = document.getElementById('menuBtn');
const navLinks = document.getElementById('navLinks');
menuBtn.addEventListener('click', () => navLinks.classList.toggle('open'));

/* ==========================================================================
   心情配置（10种）+ 种子数据。真实接入后由后端接口 GET /api/posts 提供
   ========================================================================== */
const MOODS = {
  happy:{label:'开心'}, calm:{label:'平静'}, sad:{label:'难过'}, upset:{label:'烦躁'}, anxious:{label:'迷茫'},
  grateful:{label:'感恩'}, wronged:{label:'委屈'}, tired:{label:'疲惫'}, lonely:{label:'孤独'}, hopeful:{label:'期待'}
};
const SEED_POSTS = [
  {id:'1', mood:'happy',   text:'今天阳台的多肉开花了，一件很小的事，却让我开心了一整天。', time:'2 小时前', hugs:34},
  {id:'2', mood:'calm',    text:'没什么大事发生，只是想找个地方，安静地写下今天的心情。', time:'4 小时前', hugs:21},
  {id:'3', mood:'sad',     text:'好像什么都没做好，又是emo的一天，希望明天会好一点。', time:'6 小时前', hugs:58},
  {id:'4', mood:'anxious', text:'最近总是有点心不在焉，不知道自己到底在焦虑什么。', time:'8 小时前', hugs:19},
  {id:'5', mood:'upset',   text:'今天真的很烦躁，什么事都不顺，需要一个安静的角落。', time:'10 小时前', hugs:27},
  {id:'6', mood:'happy',   text:'坚持记录心情满一个月啦，谢谢一直在看我碎碎念的你们。', time:'12 小时前', hugs:63},
  {id:'7', mood:'grateful',text:'谢谢今天陌生人递给我的那把伞，小小的善意会被记很久。', time:'14 小时前', hugs:41},
  {id:'8', mood:'lonely',  text:'一个人吃饭一个人走路，今天格外觉得安静得有点空。', time:'16 小时前', hugs:23},
  {id:'9', mood:'hopeful', text:'投了很久的简历终于有回音了，希望这次能顺利一点。', time:'18 小时前', hugs:30},
  {id:'10',mood:'tired',   text:'连续加班一周了，只想好好睡一觉，什么都不想干。', time:'20 小时前', hugs:37},
  {id:'11',mood:'wronged', text:'明明不是我的错，却要我来道歉，心里有点委屈。', time:'22 小时前', hugs:25}
];

function timeAgo(ts){
  const diff = Date.now() - ts;
  const min = Math.floor(diff / 60000);
  if (min < 1) return '刚刚';
  if (min < 60) return min + ' 分钟前';
  const hr = Math.floor(min / 60);
  if (hr < 24) return hr + ' 小时前';
  return Math.floor(hr / 24) + ' 天前';
}
function loadStoredPosts(){
  let posts = [];
  try { posts = JSON.parse(localStorage.getItem('treehole_posts') || '[]'); } catch(e){ posts = []; }
  const now = Date.now();
  const kept = posts.filter(p => !(p.duration === '24h' && now - p.createdAt > 24 * 3600 * 1000));
  if (kept.length !== posts.length){ try { localStorage.setItem('treehole_posts', JSON.stringify(kept)); } catch(e){} }
  return kept.sort((a, b) => b.createdAt - a.createdAt);
}

function deletePost(id){
  let posts = [];
  try { posts = JSON.parse(localStorage.getItem('treehole_posts') || '[]'); } catch(e){ posts = []; }
  posts = posts.filter(p => p.id !== id);
  try { localStorage.setItem('treehole_posts', JSON.stringify(posts)); } catch(e){}
  try { localStorage.removeItem('treehole_comments_' + id); } catch(e){}
}

function makeCard(id, mood, text, timeText, hugs, isOwn){
  const a = document.createElement('a');
  a.className = 'mood-card' + (isOwn ? ' own' : '');
  a.dataset.mood = mood;
  a.href = 'emotion-weather-station-detail.html?id=' + encodeURIComponent(id);

  const tag = document.createElement('span');
  tag.className = 'tag';
  tag.style.background = 'var(--m-' + mood + ')';
  tag.textContent = MOODS[mood] ? MOODS[mood].label : '心情';

  const p = document.createElement('p');
  p.textContent = text;

  const foot = document.createElement('div');
  foot.className = 'foot';
  const left = document.createElement('span'); left.textContent = '匿名 · ' + timeText;
  const right = document.createElement('span'); right.textContent = '♡ ' + hugs;
  foot.append(left, right);

  a.append(tag, p, foot);

  /* 只有本机发布过的心情才能删除，别人（种子演示数据）发的没有这个按钮 */
  if (isOwn){
    const delBtn = document.createElement('button');
    delBtn.type = 'button';
    delBtn.className = 'delete-btn';
    delBtn.setAttribute('aria-label', '删除这条心情');
    delBtn.innerHTML = '<svg class="icon"><use href="#i-close"/></svg>';
    delBtn.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      showConfirm(a, id);
    });
    a.appendChild(delBtn);
  }

  return a;
}

function showConfirm(card, id){
  if (card.querySelector('.confirm-bar')) return;
  const bar = document.createElement('div');
  bar.className = 'confirm-bar';
  bar.innerHTML = '<div>删除这条心情吗？删除后无法恢复</div><div class="row"><button data-act="cancel">再想想</button><button data-act="confirm" class="danger">确定删除</button></div>';
  bar.addEventListener('click', (e) => {
    e.preventDefault();
    e.stopPropagation();
    const act = e.target.dataset.act;
    if (act === 'confirm'){
      deletePost(id);
      renderGrid();
    } else if (act === 'cancel'){
      bar.remove();
    }
  });
  card.appendChild(bar);
}

const grid = document.getElementById('moodGrid');
function renderGrid(){
  grid.innerHTML = '';
  const stored = loadStoredPosts();
  if (stored.length === 0 && SEED_POSTS.length === 0){
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.innerHTML = '<svg class="icon"><use href="#i-hole"/></svg><div>树洞还很安静，来写下第一句心里话吧</div>';
    grid.appendChild(empty);
    return;
  }
  stored.forEach((p, i) => {
    const card = makeCard(p.id, p.mood, p.text, timeAgo(p.createdAt), p.hugs || 0, true);
    if (i === 0) card.classList.add('is-new');
    grid.appendChild(card);
  });
  SEED_POSTS.forEach(p => grid.appendChild(makeCard(p.id, p.mood, p.text, p.time, p.hugs, false)));
  updateMoodCounts();
}

/* ---- 心情筛选侧栏：从 MOODS 配置动态生成，方便以后增删心情种类 ---- */
const moodListEl = document.getElementById('moodList');
function buildMoodChips(){
  moodListEl.innerHTML = '';
  const allChip = document.createElement('button');
  allChip.className = 'mood-chip active';
  allChip.dataset.mood = 'all';
  allChip.innerHTML = '<span class="dot"></span>全部心情<span class="count">0</span>';
  moodListEl.appendChild(allChip);

  Object.keys(MOODS).forEach(key => {
    const chip = document.createElement('button');
    chip.className = 'mood-chip';
    chip.dataset.mood = key;
    chip.style.setProperty('--mood-color', 'var(--m-' + key + ')');
    chip.innerHTML = '<span class="dot"></span>' + MOODS[key].label + '<span class="count">0</span>';
    moodListEl.appendChild(chip);
  });
}
buildMoodChips();

function updateMoodCounts(){
  const cards = grid.querySelectorAll('.mood-card');
  const counts = {};
  Object.keys(MOODS).forEach(k => counts[k] = 0);
  cards.forEach(c => { if (counts[c.dataset.mood] !== undefined) counts[c.dataset.mood]++; });
  document.querySelectorAll('.mood-chip').forEach(chip => {
    const mood = chip.dataset.mood;
    const countEl = chip.querySelector('.count');
    countEl.textContent = mood === 'all' ? cards.length : (counts[mood] || 0);
  });
}

moodListEl.addEventListener('click', (e) => {
  const chip = e.target.closest('.mood-chip');
  if (!chip) return;
  document.querySelectorAll('.mood-chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  const mood = chip.dataset.mood;
  grid.querySelectorAll('.mood-card').forEach(card => {
    card.classList.toggle('is-hidden', mood !== 'all' && card.dataset.mood !== mood);
  });
});

renderGrid();

/* ==========================================================================
   漂流瓶：随机捞一条心情，优先捞评论少的，可以直接暖心回应
   ========================================================================== */
const NICKNAMES = ['路过的云','半夜的猫','晒太阳的鱼','安静的风','抱枕小熊','漂流瓶','数星星的人','慢半拍先生','小雨伞','躲雨的猫','深夜电台','纸飞机'];

/* 种子帖子的初始评论数（对应详情页 SEED_POSTS 里各自 comments 数组的长度）
   这份数据本该和详情页共用一份，目前两个文件各自维护一份，后续建议拆成公共脚本文件统一管理 */
const SEED_COMMENT_COUNTS = {'1':2,'2':1,'3':3,'4':1,'5':2,'6':3,'7':1,'8':0,'9':1,'10':2,'11':0};

function getCommentCount(id, isSeed){
  let extra = 0;
  try { extra = JSON.parse(localStorage.getItem('treehole_comments_' + id) || '[]').length; } catch(e){}
  return (isSeed ? (SEED_COMMENT_COUNTS[id] || 0) : 0) + extra;
}

function getAllPostsWithCounts(){
  const stored = loadStoredPosts().map(p => ({id:p.id, mood:p.mood, text:p.text, isSeed:false}));
  const seed = SEED_POSTS.map(p => ({id:p.id, mood:p.mood, text:p.text, isSeed:true}));
  return [...stored, ...seed].map(p => ({...p, commentCount:getCommentCount(p.id, p.isSeed)}));
}

const bottleBtn = document.getElementById('bottleBtn');
const bottleOverlay = document.getElementById('bottleOverlay');
const bottleClose = document.getElementById('bottleClose');
const bottleTag = document.getElementById('bottleTag');
const bottleText = document.getElementById('bottleText');
const bottleReplyArea = document.getElementById('bottleReplyArea');
const bottleReplyInput = document.getElementById('bottleReplyInput');
const bottleSend = document.getElementById('bottleSend');
const bottleAgain = document.getElementById('bottleAgain');
const bottleSent = document.getElementById('bottleSent');

let currentBottle = null;

function drawBottle(){
  const all = getAllPostsWithCounts();
  if (all.length === 0) return null;
  const minCount = Math.min(...all.map(p => p.commentCount));
  // 优先从"评论数最少"的一批里随机挑，让冷门的心情更容易被捞到；避免连续捞到同一条
  let pool = all.filter(p => p.commentCount === minCount && (!currentBottle || p.id !== currentBottle.id));
  if (pool.length === 0) pool = all.filter(p => !currentBottle || p.id !== currentBottle.id);
  if (pool.length === 0) pool = all;
  return pool[Math.floor(Math.random() * pool.length)];
}

function showBottle(){
  currentBottle = drawBottle();
  if (!currentBottle) return;
  bottleTag.style.background = 'var(--m-' + currentBottle.mood + ')';
  bottleTag.textContent = MOODS[currentBottle.mood] ? MOODS[currentBottle.mood].label : '心情';
  bottleText.textContent = currentBottle.text;
  bottleReplyInput.value = '';
  bottleSend.disabled = true;
  bottleReplyArea.style.display = '';
  bottleSent.classList.remove('show');
}

function openBottleModal(){
  showBottle();
  bottleOverlay.classList.add('show');
}
function closeBottleModal(){
  bottleOverlay.classList.remove('show');
}

bottleBtn.addEventListener('click', openBottleModal);
bottleClose.addEventListener('click', closeBottleModal);
bottleOverlay.addEventListener('click', (e) => { if (e.target === bottleOverlay) closeBottleModal(); });
bottleAgain.addEventListener('click', showBottle);

bottleReplyInput.addEventListener('input', () => {
  bottleSend.disabled = bottleReplyInput.value.trim().length === 0;
});

bottleSend.addEventListener('click', () => {
  const text = bottleReplyInput.value.trim();
  if (!text || !currentBottle) return;

  const nick = NICKNAMES[Math.floor(Math.random() * NICKNAMES.length)];
  const moodKeys = Object.keys(MOODS);
  const mood = moodKeys[Math.floor(Math.random() * moodKeys.length)];
  const comment = { text, nick, mood, createdAt: Date.now() };

  // 存法和详情页评论区完全一致，所以这条回应之后去详情页也能看到
  let list = [];
  try { list = JSON.parse(localStorage.getItem('treehole_comments_' + currentBottle.id) || '[]'); } catch(e){ list = []; }
  list.push(comment);
  try { localStorage.setItem('treehole_comments_' + currentBottle.id, JSON.stringify(list)); } catch(e){}

  bottleReplyArea.style.display = 'none';
  bottleSent.classList.add('show');
});

const quoteEl = document.getElementById('encourageQuote');
let lastQuoteIdx = -1;
function nextQuote(){
  let idx;
  do { idx = Math.floor(Math.random() * ENCOURAGEMENTS.length); } while (idx === lastQuoteIdx && ENCOURAGEMENTS.length > 1);
  lastQuoteIdx = idx;
  quoteEl.style.opacity = 0;
  setTimeout(() => { quoteEl.textContent = ENCOURAGEMENTS[idx]; quoteEl.style.opacity = 1; }, 350);
}
nextQuote();
