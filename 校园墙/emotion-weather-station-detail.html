<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>树洞详情 · 树洞</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#F7F4EE; --bg-elevated:#FFFFFF;
  --ink:#2B2A28; --ink-soft:#6B6660; --ink-faint:#9C968C;
  --border:rgba(43,42,40,.10); --shadow:rgba(43,42,40,.07);
  --accent-sky:#7B93AE; --accent-sky-soft:#DCE4EC;
  --accent-dawn:#E3A587; --accent-dawn-soft:#F6E4D8;
  --mist:#C9C2B4;
  --bg-glow-1:rgba(232,184,75,.10); --bg-glow-2:rgba(123,147,174,.08); --bg-glow-3:rgba(227,165,135,.07);
  --m-happy:#E8B84B; --m-calm:#9FB4C7; --m-sad:#6E86A6; --m-upset:#A9615F; --m-anxious:#AFA0C4;
  --font-display:"Noto Serif SC", serif; --font-body:"Noto Sans SC", sans-serif; --font-hand:"Ma Shan Zheng", cursive;
  --radius-s:10px; --radius-m:16px; --radius-l:28px;
  --nav-h:64px; --container:760px; --transition:.28s cubic-bezier(.4,0,.2,1);
}
html.dark{
  --bg:#14161D; --bg-elevated:#1C1F27;
  --ink:#EAE6DD; --ink-soft:#A79F92; --ink-faint:#726B60;
  --border:rgba(234,230,221,.08); --shadow:rgba(0,0,0,.35);
  --accent-sky:#8FA8C2; --accent-sky-soft:#26303C;
  --accent-dawn:#E8B79A; --accent-dawn-soft:#3A2C24; --mist:#3C3F49;
  --bg-glow-1:rgba(227,165,135,.07); --bg-glow-2:rgba(143,168,194,.05); --bg-glow-3:rgba(232,183,108,.04);
  --m-happy:#E3BD6C; --m-calm:#8FA4B8; --m-sad:#7189AA; --m-upset:#B47774; --m-anxious:#B0A2C9;
}
*{box-sizing:border-box;}
body{margin:0; background:var(--bg); background-image:radial-gradient(ellipse at 20% 40%,var(--bg-glow-1) 0%,transparent 55%),radial-gradient(ellipse at 80% 25%,var(--bg-glow-2) 0%,transparent 50%),radial-gradient(ellipse at 45% 75%,var(--bg-glow-3) 0%,transparent 45%),radial-gradient(ellipse at 10% 80%,var(--mist) 0%,transparent 40%);background-attachment:fixed;background-size:cover; color:var(--ink); font-family:var(--font-body); line-height:1.7; transition:background var(--transition), color var(--transition); -webkit-font-smoothing:antialiased;}
h1,h2,.font-display{font-family:var(--font-display);}
a{color:inherit; text-decoration:none;}
button{font-family:inherit; cursor:pointer;}
:focus-visible{outline:2px solid var(--accent-sky); outline-offset:3px; border-radius:4px;}
@media (prefers-reduced-motion:reduce){*{animation-duration:.001s !important; transition-duration:.001s !important;}}
.icon-sprite{position:absolute; width:0; height:0; overflow:hidden;}
.icon{width:20px; height:20px; stroke:currentColor; fill:none; stroke-width:1.6; stroke-linecap:round; stroke-linejoin:round; flex-shrink:0;}

.site-header{position:sticky; top:0; z-index:100; height:var(--nav-h); display:flex; align-items:center; background:color-mix(in srgb, var(--bg) 88%, transparent); backdrop-filter:blur(10px); border-bottom:1px solid var(--border);}
.site-header .inner{width:100%; max-width:1180px; margin:0 auto; padding:0 24px; display:flex; align-items:center; justify-content:space-between;}
.logo{display:flex; align-items:center; gap:10px; font-family:var(--font-display); font-weight:700; font-size:19px;}
.logo .icon{width:23px; height:23px; color:var(--accent-sky);}
.logo .sub{font-family:var(--font-hand); font-size:14px; color:var(--ink-faint); font-weight:400;}
.nav-links{display:flex; gap:6px;}
.nav-links a{padding:9px 16px; border-radius:999px; font-size:14.5px; color:var(--ink-soft); transition:background var(--transition), color var(--transition);}
.nav-links a:hover{background:var(--accent-sky-soft); color:var(--ink);}
.theme-toggle{width:38px; height:38px; border-radius:50%; border:1px solid var(--border); background:var(--bg-elevated); display:flex; align-items:center; justify-content:center; transition:transform var(--transition);}
.theme-toggle:hover{transform:rotate(18deg);}
.theme-toggle .icon{width:18px; height:18px; color:var(--ink-soft);}
.theme-toggle .icon-moon{display:none;} html.dark .theme-toggle .icon-sun{display:none;} html.dark .theme-toggle .icon-moon{display:inline-block;}
/* 背景氛围层 */
.bg-atmosphere{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0}
.bg-atmosphere .orb{position:absolute;border-radius:50%;animation:orbFloat 30s ease-in-out infinite}
.bg-atmosphere .orb:nth-child(1){width:450px;height:450px;top:-120px;left:-80px;background:radial-gradient(circle,var(--bg-glow-1),transparent 70%)}
.bg-atmosphere .orb:nth-child(2){width:350px;height:350px;bottom:-80px;right:-60px;background:radial-gradient(circle,var(--bg-glow-2),transparent 70%);animation-delay:-10s}
.bg-atmosphere .orb:nth-child(3){width:250px;height:250px;top:35%;left:55%;background:radial-gradient(circle,var(--bg-glow-3),transparent 70%);animation-delay:-18s}
.bg-atmosphere .dust{position:absolute;border-radius:50%;animation:dustFloat 20s infinite;opacity:0}
.bg-atmosphere .dust:nth-child(4){left:20%;top:20%;width:3px;height:3px;animation-duration:25s;animation-delay:0s;background:var(--accent-dawn)}
.bg-atmosphere .dust:nth-child(5){left:50%;top:60%;width:5px;height:5px;animation-duration:18s;animation-delay:-6s;background:var(--accent-sky)}
.bg-atmosphere .dust:nth-child(6){left:75%;top:30%;width:4px;height:4px;animation-duration:22s;animation-delay:-12s;background:var(--accent-dawn)}
.bg-atmosphere .dust:nth-child(7){left:30%;top:75%;width:3px;height:3px;animation-duration:20s;animation-delay:-4s;background:var(--accent-sky)}
.bg-atmosphere .dust:nth-child(8){left:85%;top:65%;width:4px;height:4px;animation-duration:26s;animation-delay:-9s;background:var(--accent-dawn)}
.bg-atmosphere .dust:nth-child(9){left:10%;top:50%;width:5px;height:5px;animation-duration:19s;animation-delay:-15s;background:var(--accent-sky)}
.bg-atmosphere .dust:nth-child(10){left:65%;top:80%;width:3px;height:3px;animation-duration:23s;animation-delay:-3s;background:var(--accent-dawn)}
@keyframes orbFloat{0%,100%{transform:translate(0,0)scale(1)}33%{transform:translate(35px,-25px)scale(1.06)}66%{transform:translate(-20px,20px)scale(.94)}}
@keyframes dustFloat{0%{transform:translateY(0)translateX(0)rotate(0);opacity:0}8%{opacity:.4}90%{opacity:.15}100%{transform:translateY(-90vh)translateX(30px)rotate(180deg);opacity:0}}

.detail-wrap{position:relative;z-index:1;max-width:var(--container); margin:0 auto; padding:28px 20px 80px;}

.back-link{
  display:inline-flex; align-items:center; gap:6px; font-size:13.5px; color:var(--ink-faint);
  margin-bottom:18px; transition:color var(--transition), gap var(--transition);
}
.back-link:hover{color:var(--accent-sky); gap:9px;}
.back-link .icon{width:15px; height:15px;}

.post-card{
  border-radius:var(--radius-l); padding:26px; margin-bottom:28px;
  border:1px solid var(--border); box-shadow:0 16px 40px -26px var(--shadow);
  background:var(--bg-elevated);
}
.post-card[data-mood="happy"]{background:linear-gradient(160deg, color-mix(in srgb, var(--m-happy) 14%, var(--bg-elevated)), var(--bg-elevated) 65%);}
.post-card[data-mood="calm"]{background:linear-gradient(160deg, color-mix(in srgb, var(--m-calm) 14%, var(--bg-elevated)), var(--bg-elevated) 65%);}
.post-card[data-mood="sad"]{background:linear-gradient(160deg, color-mix(in srgb, var(--m-sad) 14%, var(--bg-elevated)), var(--bg-elevated) 65%);}
.post-card[data-mood="upset"]{background:linear-gradient(160deg, color-mix(in srgb, var(--m-upset) 14%, var(--bg-elevated)), var(--bg-elevated) 65%);}
.post-card[data-mood="anxious"]{background:linear-gradient(160deg, color-mix(in srgb, var(--m-anxious) 14%, var(--bg-elevated)), var(--bg-elevated) 65%);}

.post-head{display:flex; align-items:center; gap:12px; margin-bottom:16px;}
.avatar{
  width:44px; height:44px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center; color:#fff;
  font-weight:700; font-size:16px; box-shadow:0 4px 12px -4px var(--shadow);
}
.post-who{display:flex; flex-direction:column; gap:2px;}
.post-who .nick{font-size:14.5px; font-weight:600;}
.post-who .meta{font-size:12px; color:var(--ink-faint); display:flex; align-items:center; gap:6px;}
.mood-tag{display:inline-flex; align-items:center; padding:2px 9px; border-radius:999px; font-size:11px; color:#fff; font-weight:500;}
.mood-tag[data-mood="happy"]{background:var(--m-happy);}
.mood-tag[data-mood="calm"]{background:var(--m-calm);}
.mood-tag[data-mood="sad"]{background:var(--m-sad);}
.mood-tag[data-mood="upset"]{background:var(--m-upset);}
.mood-tag[data-mood="anxious"]{background:var(--m-anxious);}

.post-body{font-size:16px; color:var(--ink); line-height:1.9; margin:0 0 20px; white-space:pre-wrap; word-break:break-word;}

.post-actions{display:flex; align-items:center; gap:12px;}
.hug-btn{
  display:flex; align-items:center; gap:7px; padding:9px 18px; border-radius:999px;
  border:1.5px solid var(--border); background:var(--bg-elevated); color:var(--ink-soft); font-size:13.5px;
  transition:all var(--transition);
}
.hug-btn .icon{width:16px; height:16px; transition:transform var(--transition);}
.hug-btn:hover{border-color:var(--accent-dawn); color:var(--ink);}
.hug-btn.hugged{background:var(--accent-dawn-soft); border-color:var(--accent-dawn); color:var(--ink);}
.hug-btn.hugged .icon{color:var(--accent-dawn); animation:pop .4s ease;}
@keyframes pop{0%{transform:scale(1);} 40%{transform:scale(1.35);} 100%{transform:scale(1);}}
.expire-note{font-size:12px; color:var(--ink-faint); display:flex; align-items:center; gap:5px; margin-left:auto;}
.expire-note .icon{width:13px; height:13px;}
.delete-post-btn{
  display:flex; align-items:center; gap:6px; padding:9px 16px; border-radius:999px;
  border:1.5px solid var(--border); background:var(--bg-elevated); color:var(--ink-faint); font-size:13px;
  transition:all var(--transition);
}
.delete-post-btn .icon{width:14px; height:14px;}
.delete-post-btn:hover{border-color:var(--m-upset); color:var(--m-upset);}
.delete-confirm{
  margin-top:14px; padding:14px; border-radius:var(--radius-m); background:var(--bg);
  border:1px dashed var(--border); display:none; align-items:center; justify-content:space-between; gap:12px;
  font-size:13px; color:var(--ink-soft); flex-wrap:wrap;
}
.delete-confirm.show{display:flex;}
.delete-confirm .row{display:flex; gap:8px;}
.delete-confirm button{padding:7px 16px; border-radius:999px; font-size:12.5px; border:1px solid var(--border); background:var(--bg-elevated); color:var(--ink-soft);}
.delete-confirm button.danger{background:var(--m-upset); color:#fff; border:none;}

.comment-section-title{
  font-size:15px; font-weight:600; color:var(--ink-soft); margin:0 0 18px;
  display:flex; align-items:center; gap:8px;
}
.comment-section-title .icon{width:16px; height:16px; color:var(--accent-dawn);}
.comment-section-title .count{color:var(--ink-faint); font-weight:400;}

.comment-list{display:flex; flex-direction:column; gap:16px; margin-bottom:28px;}
.comment-floor{
  display:flex; gap:12px; padding:16px; border-radius:var(--radius-m);
  background:var(--bg-elevated); border:1px solid var(--border);
  animation:riseIn .32s ease;
}
@keyframes riseIn{from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);}}
.comment-floor .avatar{width:36px; height:36px; font-size:13px;}
.comment-body{flex:1; min-width:0;}
.comment-top{display:flex; align-items:center; gap:8px; margin-bottom:6px; flex-wrap:wrap;}
.comment-top .nick{font-size:13.5px; font-weight:600;}
.comment-top .floor-num{font-size:11.5px; color:var(--ink-faint); background:var(--bg); padding:1px 8px; border-radius:999px;}
.comment-top .time{font-size:11.5px; color:var(--ink-faint); margin-left:auto;}
.comment-text{font-size:14px; color:var(--ink); line-height:1.65; margin:0 0 8px; word-break:break-word;}
.comment-reply-btn{
  display:inline-flex; align-items:center; gap:5px; font-size:12px; color:var(--ink-faint);
  padding:4px 10px; border-radius:999px; border:1px solid var(--border); background:var(--bg);
  transition:all var(--transition);
}
.comment-reply-btn .icon{width:12px; height:12px;}
.comment-reply-btn:hover{border-color:var(--accent-dawn); color:var(--ink);}
.comment-reply-btn.replied{background:var(--accent-dawn-soft); border-color:var(--accent-dawn); color:var(--ink);}

.comment-composer{
  background:var(--bg-elevated); border:1px solid var(--border); border-radius:var(--radius-m);
  padding:16px; position:sticky; bottom:16px; box-shadow:0 12px 32px -18px var(--shadow);
}
.composer-row{display:flex; gap:10px; align-items:flex-end;}
.composer-row textarea{
  flex:1; resize:none; min-height:44px; max-height:120px;
  border:1.5px solid var(--border); border-radius:var(--radius-s); background:var(--bg);
  color:var(--ink); font-family:var(--font-body); font-size:14px; padding:11px 14px; line-height:1.5;
  transition:border-color var(--transition);
}
.composer-row textarea::placeholder{color:var(--ink-faint); font-family:var(--font-hand); font-size:14.5px;}
.composer-row textarea:focus{outline:none; border-color:var(--accent-sky);}
.composer-send{
  flex-shrink:0; width:44px; height:44px; border-radius:50%; border:none;
  background:var(--accent-sky); color:#fff; display:flex; align-items:center; justify-content:center;
  transition:background var(--transition), transform var(--transition), opacity var(--transition);
}
.composer-send:hover:not(:disabled){background:color-mix(in srgb, var(--accent-sky) 85%, #000);}
.composer-send:disabled{opacity:.4; cursor:not-allowed;}
.composer-send .icon{width:18px; height:18px;}
.composer-hint{font-size:11.5px; color:var(--ink-faint); margin-top:8px; display:flex; justify-content:space-between;}

.empty-comments{text-align:center; padding:32px 0; color:var(--ink-faint); font-size:13.5px;}
.empty-comments .icon{width:28px; height:28px; margin-bottom:8px; opacity:.6;}

.empty-post{text-align:center; padding:70px 20px; color:var(--ink-faint);}
.empty-post p{font-size:14.5px; margin:0 0 16px;}
.empty-post a{color:var(--accent-sky); font-size:13.5px; text-decoration:underline;}

.site-footer{border-top:1px solid var(--border); padding:32px 24px; text-align:center; color:var(--ink-faint); font-size:12px;}

@media (max-width:520px){
  .post-actions{flex-wrap:wrap;}
  .expire-note{margin-left:0;}
}
</style>
</head>

const root = document.documentElement;
const themeToggle = document.getElementById('themeToggle');
const savedTheme = localStorage.getItem('ews-theme');
if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) root.classList.add('dark');
themeToggle.addEventListener('click', () => {
  root.classList.toggle('dark');
  localStorage.setItem('ews-theme', root.classList.contains('dark') ? 'dark' : 'light');
});

  '4':{mood:'anxious', text:'最近总是有点心不在焉，不知道自己到底在焦虑什么。', time:'8 小时前', hugs:19, duration:'24h',
       comments:[{text:'有时候不知道原因也没关系，先照顾好自己', time:'6 小时前', nick:'小雨伞'}]},
  '5':{mood:'upset', text:'今天真的很烦躁，什么事都不顺，需要一个安静的角落。', time:'10 小时前', hugs:27, duration:'permanent',
       comments:[{text:'深呼吸，一切都会过去的', time:'9 小时前', nick:'躲雨的猫'},{text:'这里就是安静的角落，多待一会儿吧', time:'7 小时前', nick:'深夜电台'}]},
  '6':{mood:'happy', text:'坚持记录心情满一个月啦，谢谢一直在看我碎碎念的你们。', time:'12 小时前', hugs:63, duration:'permanent',
       comments:[{text:'一个月啦，太棒了！继续加油～', time:'11 小时前', nick:'慢半拍先生'},{text:'见证了你的坚持，很感动', time:'8 小时前', nick:'晒太阳的鱼'},{text:'下一个月也要一起记录呀', time:'5 小时前', nick:'路过的云'}]}
};

function hashCode(str){
  let hash = 0;
  for (let i = 0; i < str.length; i++) hash = (hash * 31 + str.charCodeAt(i)) >>> 0;
  return hash;
}
function timeAgo(ts){
  const diff = Date.now() - ts;
  const min = Math.floor(diff / 60000);
  if (min < 1) return '刚刚';
  if (min < 60) return min + ' 分钟前';
  const hr = Math.floor(min / 60);
  if (hr < 24) return hr + ' 小时前';
  return Math.floor(hr / 24) + ' 天前';
}

/* ---- 读取帖子：先查种子数据，再查本地发布的数据 ---- */
function loadPost(id){
  if (SEED_POSTS[id]) return Object.assign({id, isSeed:true}, SEED_POSTS[id]);
  let stored = [];
  try { stored = JSON.parse(localStorage.getItem('treehole_posts') || '[]'); } catch(e){}
  const found = stored.find(p => p.id === id);
  if (found) return Object.assign({}, found, {isSeed:false, time:timeAgo(found.createdAt)});
  return null;
}

function updateStoredHugs(id, delta){
  let stored = [];
  try { stored = JSON.parse(localStorage.getItem('treehole_posts') || '[]'); } catch(e){ return; }
  const idx = stored.findIndex(p => p.id === id);
  if (idx === -1) return;
  stored[idx].hugs = Math.max(0, (stored[idx].hugs || 0) + delta);
  try { localStorage.setItem('treehole_posts', JSON.stringify(stored)); } catch(e){}
}

function loadExtraComments(id){
  try { return JSON.parse(localStorage.getItem('treehole_comments_' + id) || '[]'); } catch(e){ return []; }
}
function saveExtraComment(id, comment){
  const list = loadExtraComments(id);
  list.push(comment);
  try { localStorage.setItem('treehole_comments_' + id, JSON.stringify(list)); } catch(e){}
}

const params = new URLSearchParams(location.search);
const postId = params.get('id') || '1';
const post = loadPost(postId);
const postArea = document.getElementById('postArea');

if (!post){
  postArea.innerHTML = '';
  const empty = document.createElement('div');
  empty.className = 'empty-post';
  const p = document.createElement('p');
  p.textContent = '这条心情已经消失在风里了，也许它想说的话已经说完了。';
  const a = document.createElement('a');
  a.href = 'emotion-weather-station-global.html';
  a.textContent = '回到树洞广场';
  empty.append(p, a);
  postArea.appendChild(empty);
} else {
  const nickname = NICKNAMES[hashCode(String(postId)) % NICKNAMES.length];

  postArea.innerHTML =
    '<div class="post-card" id="postCard">' +
      '<div class="post-head">' +
        '<div class="avatar" id="postAvatar"></div>' +
        '<div class="post-who">' +
          '<span class="nick" id="postNick"></span>' +
          '<span class="meta"><span class="mood-tag" id="postMoodTag"></span><span id="postTime"></span></span>' +
        '</div>' +
      '</div>' +
      '<p class="post-body" id="postBody"></p>' +
      '<div class="post-actions">' +
        '<button class="hug-btn" id="hugBtn"><svg class="icon"><use href="#i-heart"/></svg><span id="hugCount"></span> 暖心抱抱</button>' +
        '<span class="expire-note" id="expireNote"></span>' +
        (post.isSeed ? '' : '<button class="delete-post-btn" id="deletePostBtn"><svg class="icon"><use href="#i-trash"/></svg>删除</button>') +
      '</div>' +
      (post.isSeed ? '' : '<div class="delete-confirm" id="deleteConfirm"><span>删除这条心情吗？删除后无法恢复</span><div class="row"><button data-act="cancel">再想想</button><button data-act="confirm" class="danger">确定删除</button></div></div>') +
    '</div>' +
    '<h2 class="comment-section-title"><svg class="icon"><use href="#i-comment"/></svg>楼层回声 <span class="count" id="commentCount"></span></h2>' +
    '<div class="comment-list" id="commentList"></div>' +
    '<div class="comment-composer">' +
      '<div class="composer-row">' +
        '<textarea id="commentInput" maxlength="200" placeholder="留一句暖心的话……" rows="1"></textarea>' +
        '<button class="composer-send" id="commentSend" disabled><svg class="icon"><use href="#i-send"/></svg></button>' +
      '</div>' +
      '<div class="composer-hint"><span>匿名回复，最多 200 字</span><span id="commentCharCount">0 / 200</span></div>' +
    '</div>';

  document.getElementById('postCard').dataset.mood = post.mood;
  const avatar = document.getElementById('postAvatar');
  avatar.style.background = 'var(--m-' + post.mood + ')';
  avatar.textContent = nickname.charAt(0);
  document.getElementById('postNick').textContent = nickname;
  const moodTag = document.getElementById('postMoodTag');
  moodTag.dataset.mood = post.mood;
  moodTag.textContent = MOODS[post.mood] ? MOODS[post.mood].label : '心情';
  document.getElementById('postTime').textContent = post.time;
  document.getElementById('postBody').textContent = post.text;
  document.getElementById('hugCount').textContent = post.hugs || 0;
  document.getElementById('expireNote').innerHTML = post.duration === '24h'
    ? '<svg class="icon"><use href="#i-timer"/></svg>24 小时后自动消失'
    : '<svg class="icon"><use href="#i-infinity"/></svg>永久保留';

  const hugBtn = document.getElementById('hugBtn');
  let hugged = false;
  hugBtn.addEventListener('click', () => {
    hugged = !hugged;
    const countEl = document.getElementById('hugCount');
    let count = parseInt(countEl.textContent, 10);
    countEl.textContent = hugged ? count + 1 : count - 1;
    hugBtn.classList.toggle('hugged', hugged);
    if (!post.isSeed) updateStoredHugs(postId, hugged ? 1 : -1);
  });

  /* ---- 删除自己发布的心情（仅本机发布过的帖子才有这个入口） ---- */
  if (!post.isSeed){
    const deleteBtn = document.getElementById('deletePostBtn');
    const deleteConfirm = document.getElementById('deleteConfirm');
    deleteBtn.addEventListener('click', () => deleteConfirm.classList.add('show'));
    deleteConfirm.addEventListener('click', (e) => {
      const act = e.target.dataset.act;
      if (act === 'cancel'){
        deleteConfirm.classList.remove('show');
      } else if (act === 'confirm'){
        let stored = [];
        try { stored = JSON.parse(localStorage.getItem('treehole_posts') || '[]'); } catch(err){ stored = []; }
        stored = stored.filter(p => p.id !== postId);
        try { localStorage.setItem('treehole_posts', JSON.stringify(stored)); } catch(err){}
        try { localStorage.removeItem('treehole_comments_' + postId); } catch(err){}
        window.location.href = 'emotion-weather-station-global.html';
      }
    });
  }

  /* ---- 评论楼层 ---- */
  const commentList = document.getElementById('commentList');
  const commentCountEl = document.getElementById('commentCount');
  let floorNum = 1;

  function renderComment(text, timeText, nick, mood){
    const floor = document.createElement('div');
    floor.className = 'comment-floor';

    const av = document.createElement('div');
    av.className = 'avatar';
    av.style.background = 'var(--m-' + mood + ')';
    av.textContent = nick.charAt(0);

    const body = document.createElement('div');
    body.className = 'comment-body';

    const top = document.createElement('div');
    top.className = 'comment-top';
    const nickEl = document.createElement('span'); nickEl.className = 'nick'; nickEl.textContent = nick;
    const floorEl = document.createElement('span'); floorEl.className = 'floor-num'; floorEl.textContent = floorNum + '楼';
    const timeEl = document.createElement('span'); timeEl.className = 'time'; timeEl.textContent = timeText;
    top.append(nickEl, floorEl, timeEl);

    const textEl = document.createElement('p');
    textEl.className = 'comment-text';
    textEl.textContent = text;

    const replyBtn = document.createElement('button');
    replyBtn.className = 'comment-reply-btn';
    replyBtn.innerHTML = '<svg class="icon"><use href="#i-heart"/></svg>暖心回复';
    replyBtn.addEventListener('click', () => replyBtn.classList.toggle('replied'));

    body.append(top, textEl, replyBtn);
    floor.append(av, body);
    floorNum++;
    commentList.appendChild(floor);
  }

  function updateCommentCount(total){
    commentCountEl.textContent = '（' + total + '）';
  }

  const seedComments = post.isSeed ? post.comments : [];
  const extraComments = loadExtraComments(postId);
  const totalComments = seedComments.length + extraComments.length;

  if (totalComments === 0){
    commentList.innerHTML = '<div class="empty-comments"><svg class="icon"><use href="#i-comment"/></svg><div>还没有人留言，来做第一个温暖的声音吧</div></div>';
  } else {
    seedComments.forEach(c => renderComment(c.text, c.time, c.nick, MOODS[Object.keys(MOODS)[hashCode(c.nick) % 5]] ? Object.keys(MOODS)[hashCode(c.nick) % 5] : 'calm'));
    extraComments.forEach(c => renderComment(c.text, timeAgo(c.createdAt), c.nick, c.mood));
  }
  updateCommentCount(totalComments);

  const commentInput = document.getElementById('commentInput');
  const commentSend = document.getElementById('commentSend');
  const commentCharCount = document.getElementById('commentCharCount');

  commentInput.addEventListener('input', () => {
    commentInput.style.height = 'auto';
    commentInput.style.height = Math.min(commentInput.scrollHeight, 120) + 'px';
    const len = commentInput.value.trim().length;
    commentCharCount.textContent = commentInput.value.length + ' / 200';
    commentSend.disabled = len === 0;
  });

  function submitComment(){
    const text = commentInput.value.trim();
    if (!text) return;

    const emptyState = commentList.querySelector('.empty-comments');
    if (emptyState) emptyState.remove();

    const nick = NICKNAMES[Math.floor(Math.random() * NICKNAMES.length)];
    const moodKeys = Object.keys(MOODS);
    const mood = moodKeys[Math.floor(Math.random() * moodKeys.length)];
    const comment = { text, nick, mood, createdAt: Date.now() };

    renderComment(text, '刚刚', nick, mood);
    saveExtraComment(postId, comment);
    updateCommentCount(commentList.querySelectorAll('.comment-floor').length);

    commentInput.value = '';
    commentInput.style.height = 'auto';
    commentCharCount.textContent = '0 / 200';
    commentSend.disabled = true;
    // 实际接入时改为 fetch(`/api/posts/${postId}/comments`, { method:'POST', body: JSON.stringify({text}) })
  }

  commentSend.addEventListener('click', submitComment);
  commentInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); submitComment(); }
  });
}
</script>
